Description: CD12352 - Infrastructure as Code Project - Udagram
#-----------------------------------------------------------------------------#
Parameters:
  ProjectName:
    Description: A project name that will be prefixed to resource names.
    Type: String

  AutoScalingGroupDesiredCapacity:
    Description: The desired capacity of the Auto Scaling Group.
    Type: String
    Default: "1"
#-----------------------------------------------------------------------------#
Resources:
#-----------------------------------------------------------------------------#
#                       Launch Template                                       #
#-----------------------------------------------------------------------------#
  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties: 
      LaunchTemplateData:
        UserData:
          Fn::Base64: |
            #!/bin/bash
            apt-get update -y
            sudo apt-get install nginx -y
            service nginx start
        ImageId: ami-0b6d9d3d33ba97d99
        SecurityGroupIds:
            - !Ref WebServerSecGroup
        InstanceType: t2.micro
        IamInstanceProfile:
            Name: !Ref WebServerInstanceProfile
        BlockDeviceMappings:
          - DeviceName: "/dev/sdk"
            Ebs:
              VolumeSize: 10
#-----------------------------------------------------------------------------#
#                          Auto-Scaling Group                                 #
#-----------------------------------------------------------------------------#
  WebAppGroup:
      Type: AWS::AutoScaling::AutoScalingGroup
      Properties:
        VPCZoneIdentifier:
        - Fn::ImportValue: 
            !Sub "${ProjectName}-private-subnets"
        LaunchTemplate:
          LaunchTemplateId: !Ref WebAppLaunchTemplate
          Version: !GetAtt WebAppLaunchTemplate.LatestVersionNumber
        MinSize: '1'
        DesiredCapacity: !Ref AutoScalingGroupDesiredCapacity
        MaxSize: '6'
        TargetGroupARNs:
        - Ref: WebAppTargetGroup
#-----------------------------------------------------------------------------#
#                        Load Balancer Security Group                         #
#-----------------------------------------------------------------------------#
  LBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow http access to our load balancer
      VpcId:
        Fn::ImportValue:
          !Sub "${ProjectName}-vpc-id"
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
#-----------------------------------------------------------------------------#
#                         Web Server Security Group                           #
#-----------------------------------------------------------------------------#
  WebServerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow http access to our hosts from the LB Security Group
      VpcId:
        Fn::ImportValue:
          !Sub "${ProjectName}-vpc-id"
      SecurityGroupEgress:
      - IpProtocol: tcp
        FromPort: 0
        ToPort: 65535
        CidrIp: 0.0.0.0/0
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        SourceSecurityGroupId: !Ref LBSecGroup
#-----------------------------------------------------------------------------#
#                        Load Balancer Target Group                           #
#-----------------------------------------------------------------------------#
  WebAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 10
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 8
      HealthyThresholdCount: 2
      Port: 80
      Protocol: HTTP
      UnhealthyThresholdCount: 5
      VpcId: 
        Fn::ImportValue:
          Fn::Sub: "${ProjectName}-vpc-id"
#-----------------------------------------------------------------------------#
#                        Application Load Balancer                            #
#-----------------------------------------------------------------------------#
  WebAppLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets:
      - Fn::ImportValue: !Sub "${ProjectName}-public-subnet1"
      - Fn::ImportValue: !Sub "${ProjectName}-public-subnet2"
      SecurityGroups:
      - Ref: LBSecGroup
#-----------------------------------------------------------------------------#
#                          LB Listener                                        #
#-----------------------------------------------------------------------------#
  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
      - Type: forward
        TargetGroupArn:
          Ref: WebAppTargetGroup
      LoadBalancerArn:
        Ref: WebAppLB
      Port: '80'
      Protocol: HTTP
#------------------------------------------------------------------------------#
  ALBListenerRule:
      Type: AWS::ElasticLoadBalancingV2::ListenerRule
      Properties:
        Actions:
        - Type: forward
          TargetGroupArn: !Ref 'WebAppTargetGroup'
        Conditions:
        - Field: path-pattern
          Values: [/]
        ListenerArn: !Ref 'Listener'
        Priority: 1
#------------------------------------------------------------------------------#
#                   Static Resources - S3 Bucket                               #
#------------------------------------------------------------------------------#
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-s3-bucket"
      AccessControl: Private
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Status: "Enabled"
            NoncurrentVersionExpirationInDays: 10
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
#------------------------------------------------------------------------------#
#                   IAM Role for S3 Bucket Access                              #
#------------------------------------------------------------------------------#
  WebServerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: "web-servers-instance-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: 'Allow'
          Principal:
            Service:
            - 'ec2.amazonaws.com'
          Action:
          - 'sts:AssumeRole'
      Policies:
        - PolicyName: s3
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Effect: Allow
              Action:
              - 's3:PutObject'
              - 's3:GetObject'
              - 's3:DeleteObject*'
              Resource:
                - !GetAtt S3Bucket.Arn
#------------------------------------------------------------------------------#
#                          Instance Profile                                    #
#------------------------------------------------------------------------------#
  WebServerInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: '/'
      Roles:
      - !Ref WebServerInstanceRole

Outputs:
  PublicURL:
    Description: "The publuc URL of the Application Load Balancer"
    Value: !Sub "http://${WebAppLB.DNSName}/"
    Export:
      Name: !Sub "${ProjectName}-PublicURL"